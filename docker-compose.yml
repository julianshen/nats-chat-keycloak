services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  nats:
    image: nats:2.12
    command: -c /etc/nats/nats-server.conf -DV
    ports:
      - "4222:4222"
      - "9222:9222"
      - "8222:8222"
    volumes:
      - ./infra/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data/jetstream

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat-secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: auth
      NATS_PASS: auth-secret-password
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: nats-chat
      KEYCLOAK_ISSUER_URL: http://localhost:8080/realms/nats-chat
      ISSUER_NKEY_SEED: SAANDLKMXL6CUS3CP52WIXBEDN6YJ545GDKC65U5JZPPV6WH6ESWUA6YAI
      XKEY_SEED: SXAAXMRAEP6JWWHNB6IKFL554IE6LZVT6EY5MBRICPILTLOPHAG73I3YX4
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: auth-service
    depends_on:
      - nats
      - keycloak
      - postgres
      - otel-collector
    restart: unless-stopped

  persist-worker:
    build:
      context: .
      dockerfile: services/persist-worker/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: persist-worker
      NATS_PASS: persist-worker-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: persist-worker
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  history-service:
    build:
      context: .
      dockerfile: services/history/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: history-service
      NATS_PASS: history-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: history-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  fanout-service:
    build:
      context: .
      dockerfile: services/fanout/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: fanout-service
      NATS_PASS: fanout-service-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: fanout-service
    depends_on:
      - nats
      - otel-collector
    restart: unless-stopped

  presence-service:
    build:
      context: .
      dockerfile: services/presence/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: presence-service
      NATS_PASS: presence-service-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: presence-service
    depends_on:
      - nats
      - otel-collector
    restart: unless-stopped

  read-receipt-service:
    build:
      context: .
      dockerfile: services/read-receipt/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: read-receipt-service
      NATS_PASS: read-receipt-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: read-receipt-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  room-service:
    build:
      context: .
      dockerfile: services/room/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: room-service
      NATS_PASS: room-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: room-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  user-search-service:
    build:
      context: .
      dockerfile: services/user-search/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: user-search-service
      NATS_PASS: user-search-service-secret
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASS: admin
      KEYCLOAK_REALM: nats-chat
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: user-search-service
    depends_on:
      - nats
      - keycloak
      - otel-collector
    restart: unless-stopped

  translation-service:
    build:
      context: .
      dockerfile: services/translation/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: translation-service
      NATS_PASS: translation-service-secret
      OLLAMA_URL: http://host.docker.internal:11434
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: translation-service
    depends_on:
      - nats
      - otel-collector
    restart: unless-stopped

  sticker-service:
    build:
      context: .
      dockerfile: services/sticker/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: sticker-service
      NATS_PASS: sticker-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      STICKER_BASE_URL: http://localhost:8090/images
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: sticker-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  sticker-images:
    build:
      context: .
      dockerfile: infra/sticker-images/Dockerfile
    ports:
      - "8090:8090"
    restart: unless-stopped

  app-registry-service:
    build:
      context: .
      dockerfile: services/app-registry/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: app-registry-service
      NATS_PASS: app-registry-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: app-registry-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  poll-service:
    build:
      context: .
      dockerfile: apps/poll/service/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: poll-service
      NATS_PASS: poll-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: poll-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  poll-app:
    build:
      context: .
      dockerfile: apps/poll/app/Dockerfile
    ports:
      - "8091:8091"
    restart: unless-stopped

  whiteboard-service:
    build:
      context: .
      dockerfile: apps/whiteboard/service/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: whiteboard-service
      NATS_PASS: whiteboard-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: whiteboard-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  whiteboard-app:
    build:
      context: .
      dockerfile: apps/whiteboard/app/Dockerfile
    ports:
      - "8092:8092"
    restart: unless-stopped

  kb-service:
    build:
      context: .
      dockerfile: apps/kb/service/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: kb-service
      NATS_PASS: kb-service-secret
      DATABASE_URL: jdbc:postgresql://postgres:5432/chatdb
      DB_USER: chat
      DB_PASSWORD: chat-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: kb-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  kb-app:
    build:
      context: .
      dockerfile: apps/kb/app/Dockerfile
    ports:
      - "8093:8093"
    restart: unless-stopped

  e2ee-key-service:
    build:
      context: .
      dockerfile: services/e2ee-key/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: e2ee-key-service
      NATS_PASS: e2ee-key-service-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: e2ee-key-service
    depends_on:
      - nats
      - otel-collector
    restart: unless-stopped

  file-upload:
    build:
      context: .
      dockerfile: services/file-upload/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      NATS_USER: file-upload-service
      NATS_PASS: file-upload-service-secret
      DATABASE_URL: postgres://chat:chat-secret@postgres:5432/chatdb?sslmode=disable
      MEDIA_BASE_URL: http://media-server:8095
      MEDIA_TOKEN_SECRET: shared-media-secret
      TOKEN_TTL_SECONDS: "300"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: file-upload-service
    depends_on:
      - nats
      - postgres
      - otel-collector
    restart: unless-stopped

  media-server:
    build:
      context: .
      dockerfile: services/media-server/Dockerfile
    ports:
      - "8095:8095"
    environment:
      MEDIA_TOKEN_SECRET: shared-media-secret
      UPLOAD_DIR: /data/uploads
      HTTP_PORT: "8095"
      MAX_UPLOAD_SIZE: "52428800"
    volumes:
      - file-uploads:/data/uploads
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: nats-chat
      VITE_KEYCLOAK_CLIENT_ID: nats-chat-app
      VITE_NATS_WS_URL: ws://localhost:9222
    depends_on:
      - keycloak
      - nats

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./observability/prometheus/recording-rules.yaml:/etc/prometheus/recording-rules.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  loki:
    image: grafana/loki:3.4.2
    user: "10001"
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3001:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  nats-data:
  postgres-data:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
  file-uploads:
