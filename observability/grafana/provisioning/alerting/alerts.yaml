apiVersion: 1

contactPoints:
  - orgId: 1
    name: grafana-default-email
    receivers:
      - uid: grafana-default-email
        type: email
        settings:
          addresses: admin@localhost
        disableResolveMessage: true
  - orgId: 1
    name: webhook-alerts
    receivers:
      - uid: webhook-alerts
        type: webhook
        settings:
          url: ${ALERT_WEBHOOK_URL:-http://localhost:9095/alerts}
          httpMethod: POST

policies:
  - orgId: 1
    receiver: webhook-alerts
    group_by:
      - grafana_folder
      - alertname
    routes:
      - receiver: webhook-alerts
        matchers:
          - severity = critical
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
      - receiver: webhook-alerts
        matchers:
          - severity = warning
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 12h

groups:
  - orgId: 1
    name: service-health
    folder: Alerts
    interval: 30s
    rules:
      - uid: service-down-auth
        title: "ServiceDown: auth-service"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(traces_spanmetrics_calls_total{service_name="auth-service"}[5m])
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 0.001
              refId: C
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "auth-service is down (no spans received in 5m)"

