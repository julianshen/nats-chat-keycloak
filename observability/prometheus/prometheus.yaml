global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/recording-rules.yaml

scrape_configs:
  - job_name: otel-collector
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: tempo
    scrape_interval: 15s
    static_configs:
      - targets: ['tempo:3200']

  - job_name: loki
    scrape_interval: 15s
    static_configs:
      - targets: ['loki:3100']

  - job_name: prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']

  # NATS server monitoring metrics
  - job_name: nats
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['nats:8222']

  # Keycloak metrics (Micrometer)
  - job_name: keycloak
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ['keycloak:9000']
