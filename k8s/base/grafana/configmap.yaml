apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
        isDefault: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus

      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              name: TraceID
              url: "$${__value.raw}"
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /etc/grafana/provisioning/dashboards
          foldersFromFilesStructure: false
  alerts.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: webhook-alerts
        receivers:
          - uid: webhook-alerts
            type: webhook
            settings:
              url: ${ALERT_WEBHOOK_URL:-http://localhost:9095/alerts}
              httpMethod: POST
    policies:
      - orgId: 1
        receiver: webhook-alerts
        group_by:
          - grafana_folder
          - alertname
