apiVersion: apps/v1
kind: Deployment
metadata:
  name: poll-app
  labels:
    app: poll-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poll-app
  template:
    metadata:
      labels:
        app: poll-app
    spec:
      containers:
        - name: poll-app
          imagePullPolicy: IfNotPresent
          image: nats-chat/poll-app:latest
          ports:
            - containerPort: 8091
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
