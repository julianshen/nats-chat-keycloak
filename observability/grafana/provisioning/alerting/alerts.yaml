  - orgId: 1
    name: error-rates
    folder: Alerts
    interval: 30s
    rules:
      - uid: high-error-rate
        title: "High Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                (
                  sum by (service_name) (rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m]))
                  /
                  sum by (service_name) (rate(traces_spanmetrics_calls_total[5m]))
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.05
              refId: C
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate exceeds 5% for a service"

      - uid: persist-worker-errors
        title: "Persist Worker Errors"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(messages_persist_errors_total[5m])
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: C
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Persist worker has more than 5 errors in 5 minutes"

      - uid: auth-rejection-spike
        title: "Auth Rejection Spike"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                (
                  sum(rate(auth_requests_total{result="rejected"}[5m]))
                  /
                  sum(rate(auth_requests_total[5m]))
                )
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.20
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Auth rejection rate exceeds 20%"

  - orgId: 1
    name: latency
    folder: Alerts
    interval: 30s
    rules:
      - uid: slow-requests
        title: "Slow Requests"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum by (le, service_name) (rate(traces_spanmetrics_duration_seconds_bucket[5m])))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 2
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 request latency exceeds 2 seconds"

      - uid: high-fanout-latency
        title: "High Fanout Latency"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum by (le) (rate(fanout_duration_seconds_bucket[5m])))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.5
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Fanout P95 latency exceeds 500ms"

  - orgId: 1
    name: slo-burn-rates
    folder: Alerts
    interval: 30s
    rules:
      - uid: slo-message-delivery-burn-fast
        title: "SLO Burn: Message Delivery (fast)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: slo:message_delivery:error_ratio_5m > (14.4 * 0.001)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: slo:message_delivery:error_ratio_1h > (14.4 * 0.001)
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0 && $B > 0"
              refId: C
        for: 2m
        labels:
          severity: critical
          slo: message-delivery
        annotations:
          summary: "Message delivery SLO (99.9%) burning error budget 14.4x faster than sustainable"

      - uid: slo-message-delivery-burn-slow
        title: "SLO Burn: Message Delivery (slow)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus
            model:
              expr: slo:message_delivery:error_ratio_1h > (3 * 0.001)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: prometheus
            model:
              expr: slo:message_delivery:error_ratio_6h > (3 * 0.001)
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0 && $B > 0"
              refId: C
        for: 15m
        labels:
          severity: warning
          slo: message-delivery
        annotations:
          summary: "Message delivery SLO (99.9%) burning error budget 3x faster than sustainable"

      - uid: slo-fanout-latency-burn
        title: "SLO Burn: Fanout Latency"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: slo:fanout_latency:p99_5m > 0.200
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: slo:fanout_latency:p99_1h > 0.200
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0 && $B > 0"
              refId: C
        for: 5m
        labels:
          severity: warning
          slo: fanout-latency
        annotations:
          summary: "Fanout P99 latency exceeds 200ms SLO target"

  - orgId: 1
    name: infrastructure
    folder: Alerts
    interval: 30s
    rules:
      - uid: nats-slow-consumers
        title: "NATS Slow Consumers"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(gnatsd_varz_slow_consumers[5m])
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: C
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "NATS has slow consumers — messages may be dropping"

      - uid: postgres-connection-saturation
        title: "PostgreSQL Connection Saturation"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                sum(db_sql_connections_open)
                /
                sum(db_sql_connections_max_open) > 0.8
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool >80% utilized"
